<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Convênios — DCGCE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 480px;
        }
        h1 { color: #1a3a5c; margin-bottom: 0.5rem; }
        p { color: #555; }
        .badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.4rem 1rem;
            background: #e8f0fe;
            color: #1a3a5c;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Painel de Convênios</h1>
        <p>DCGCE</p>
        <div class="badge">Em construção</div>
    </div>
</body>
</html>
